<!doctype html>
<html>
  <head>
    <title>Snake Game Level</title>
    <link rel="stylesheet" href="./public/style.css" />
  </head>
  <body>
    <h1>Snake Game</h1>
    <canvas id="game" width="800" height="400"></canvas>
    <!-- PANEL LEVEL -->
    <div id="levelPanel" class="hidden">
      <h2 id="levelText"></h2>
      <p id="scoreText"></p>
      <button id="nextLevelBtn">Mulai Level Selanjutnya</button>
    </div>

    <div>
      <h2>Kontrol:</h2>
      <ul>
        <li>WASD untuk Player 1 (Ular Hijau)</li>
        <li>Arrow Keys untuk Player 2 (Ular Biru)</li>
        <li>Kumpulkan makanan untuk mendapatkan poin.</li>
        <li>Hindari menabrak dinding atau tubuh sendiri.</li>
      </ul>
    </div>

    <script src="./public/fungsiPlayer.js"></script>

  

    <script src="./public/game.js"></script>
  </body>
</html>
