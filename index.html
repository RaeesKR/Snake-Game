<!doctype html>
<html>
  <head>
    <title>Snake Game Level</title>
    <link rel="stylesheet" href="./public/style.css" />
  </head>
  <body>
    <h1>Snake Game</h1>
    <canvas id="game" width="800" height="400"></canvas>
    <!-- PANEL LEVEL -->
    <div id="levelPanel" class="hidden">
      <h2 id="levelText"></h2>
      <p id="scoreText"></p>
      <button id="nextLevelBtn">Mulai Level Selanjutnya</button>
    </div>

    <dialog id="infoDialog">
      <h2>Information:</h2>
      <p>WASD untuk Player 1 (Ular Hijau)</p>
      <p>Arrow Keys untuk Player 2 (Ular Biru)</p>
      <p>Kumpulkan makanan untuk mendapatkan poin.</p>
      <p>Hindari menabrak tubuh sendiri/lawan (Level Easy-Medium)</p>
      <p>Hindari menabrak dinding (Level Hard)</p>

      <button id="mulaiGame">Mulai Game</button>
    </dialog>

    <script src="./public/fungsiPlayer.js"></script>

    <script src="./public/game.js"></script>
  </body>
</html>
